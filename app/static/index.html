<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TCBScanner</title>
    <script>
      (() => {
        const saved = localStorage.getItem("tcbscanner-theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = saved || (prefersDark ? "dark" : "light");
      })();
    </script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">TCBScanner</p>
            <h1>Manga CBZ queue</h1>
          </div>
          <div class="topbar-actions">
            <button class="icon-button" id="optionsToggle" title="Options" aria-label="Options">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m19.4 13.5.1-1.5-.1-1.5 2-1.5-2-3.5-2.4 1a9 9 0 0 0-2.6-1.5L14 2h-4l-.4 2.5A9 9 0 0 0 7 6L4.6 5 2.6 8.5l2 1.5L4.5 12l.1 1.5-2 1.5 2 3.5 2.4-1a9 9 0 0 0 2.6 1.5L10 22h4l.4-2.5a9 9 0 0 0 2.6-1.5l2.4 1 2-3.5-2-1.5ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/></svg>
            </button>
            <button class="icon-button" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 18a6 6 0 0 0 5.2-9A7.5 7.5 0 1 1 9 17.7 6 6 0 0 0 12 18Z"/></svg>
            </button>
            <button class="icon-button" id="refreshAll" title="Refresh dashboard" aria-label="Refresh dashboard">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 0 1-14.9 4H2.8l3.4 3.4L9.7 16H7.5A6 6 0 1 0 6 12H4a8 8 0 1 1 16 0Z"/></svg>
            </button>
          </div>
        </header>

        <section class="options-panel hidden" id="optionsPanel" aria-label="Options">
          <form class="options-form" id="optionsForm">
            <label>
              <span>Default naming format</span>
              <input name="default_naming_format" type="text" placeholder="{ChapterFullTitle}" />
            </label>
            <button class="primary-action" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4ZM12 19a3 3 0 1 1 0-6 3 3 0 0 1 0 6Zm3-10H5V5h10v4Z"/></svg>
              <span>Save options</span>
            </button>
            <div class="variable-list" id="namingVariables"></div>
          </form>
        </section>

        <section class="setup-panel" aria-label="Add series">
          <form id="seriesForm">
            <label>
              <span>Source URL</span>
              <input name="source_url" type="url" required placeholder="https://tcbonepiecechapters.com/mangas/5/one-piece" />
            </label>
            <label>
              <span>Library title</span>
              <input name="title" type="text" required placeholder="One Piece" />
            </label>
            <label>
              <span>Folder</span>
              <input name="folder" type="text" placeholder="One Piece" />
            </label>
            <label>
              <span>Check interval (hours)</span>
              <input name="check_interval_hours" type="number" min="1" max="168" value="1" />
            </label>
            <label class="toggle-line">
              <input name="backfill_existing" type="checkbox" />
              <span>Download all found chapters</span>
            </label>
            <label class="toggle-line">
              <input name="enabled" type="checkbox" checked />
              <span>Monitor new chapters</span>
            </label>
            <button class="primary-action" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"/></svg>
              <span>Scan series</span>
            </button>
          </form>
        </section>

        <section class="content-grid">
          <section class="series-region" aria-label="Series">
            <div class="section-heading">
              <h2>Series</h2>
              <span id="seriesCount">0 tracked</span>
            </div>
            <div class="series-list" id="seriesList"></div>
          </section>

          <section class="chapter-region" aria-label="Chapters">
            <div class="section-heading">
              <h2 id="chapterTitle">Chapters</h2>
              <span id="chapterCount">Select a series</span>
            </div>
            <div class="chapter-tools" id="chapterTools">
              <button class="small-action" id="selectVisibleChapters" type="button">Select found</button>
              <button class="small-action" id="clearSelectedChapters" type="button">Clear</button>
              <button class="small-action" id="queueSelectedChapters" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 4h2v8l3.3-3.3 1.4 1.4L12 15.8 6.3 10.1l1.4-1.4L11 12V4Zm-5 14h12v2H6v-2Z"/></svg>
                <span>Queue selected</span>
              </button>
              <span id="selectedCount">0 selected</span>
            </div>
            <div class="chapter-list" id="chapterList"></div>
          </section>

          <section class="activity-region" aria-label="Activity">
            <div class="section-heading">
              <h2>Activity</h2>
              <span id="activityStatus">Live</span>
            </div>
            <div class="event-list" id="eventList"></div>
          </section>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
