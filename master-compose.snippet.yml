# Drop this service under `services:` in C:/Docker/master-docker-compose.yml
# if you want it managed by the Deep_Stack compose file.
#
# The source/build context stays in this workspace, while state and CBZ output
# follow the existing C:/Docker and P:/Media folder conventions. The app writes
# finished CBZ files to /manga inside the container.

  tcbscanner:
    build:
      context: C:/Codex/Docker
    container_name: tcbscanner
    restart: unless-stopped
    ports:
      - 18080:8080
    environment:
      TZ: America/New_York
      DATA_DIR: /data
      LIBRARY_DIR: /manga
      WORK_DIR: /data/work
      TCB_CHECK_SECONDS: "60"
      TCB_REQUEST_DELAY: "0.8"
    volumes:
      - type: bind
        source: "C:/Docker/TCBScanner/data"
        target: /data
      - type: bind
        source: "P:/Media/10. Books/2. Manga"
        target: /manga
